{% extends 'employees/base.html' %}

{% block title %}{{ form_title }}{% endblock %}

{% block subheader %}
<p>{{ form_title }}</p>
{% endblock %}

{% block content %}
<h2>{{ form_title }}</h2>

<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label>Employee ID:</label>
        <input type="text" name="employee_id" value="{{ employee.employee_id|default:'' }}" required>
    </div>
    <div class="form-group">
        <label>First Name:</label>
        <input type="text" name="first_name" value="{{ employee.first_name|default:'' }}" required>
    </div>
    <div class="form-group">
        <label>Last Name:</label>
        <input type="text" name="last_name" value="{{ employee.last_name|default:'' }}" required>
    </div>
    <div class="form-group">
        <label>Email:</label>
        <input type="email" name="email" value="{{ employee.email|default:'' }}" required>
    </div>
    <div class="form-group">
        <label>Phone:</label>
        <input type="text" name="phone" value="{{ employee.phone|default:'' }}" required>
    </div>
    <div class="form-group">
        <label>Salary:</label>
        <input type="number" name="salary" step="0.01" value="{{ employee.salary|default:'' }}" required>
    </div>
    <div class="form-group">
        <label>Joining Date:</label>
        <input type="date" name="joining_date" value="{{ employee.joining_date|date:'Y-m-d' }}" required>
    </div>
    <div class="form-group">
        <label>Designation:</label>
        <input type="text" name="designation" value="{{ employee.designation|default:'' }}" required>
    </div>
    <div class="form-group">
        <label>Department:</label>
        <select name="department" required>
            <option value="">Select Department</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}"
                {% if employee.department_id == dept.id %}selected{% endif %}>
                {{ dept.name }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Status:</label>
        <select name="status">
            <option value="active" {% if employee.status == 'active' %}selected{% endif %}>Active</option>
            <option value="inactive" {% if employee.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
    </div>
    <button type="submit">Save</button>
    <a href="{% url 'employees:employee_list' %}">Cancel</a>
</form>
{% endblock %}
